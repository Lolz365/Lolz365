name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Override commit author display in Actions logs
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git author as Lolz365
        run: |
          git config user.name "Lolz365"
          git config user.email "lolz365@users.noreply.github.com"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
